[target]
name = "autonomous-development"
path = "/Users/dannyliu/personal_projects/autonomous-development"
branch = "main"
objective = """Implement safety rails, shared compute protocol, and trace review for autonomous-development.

Read the full spec at docs/superpowers/specs/2026-03-12-safety-rails-shared-compute-trace-review-design.md before starting.

Implementation priorities (in order):

1. GIT RATCHET: Create src/autodev/ratchet.py with GitRatchet class. checkpoint(proposal_id) creates a git tag autodev/pre-{id}. verify_and_decide(tag, verification_cmd) runs verification and returns keep/rollback. rollback(tag) does git reset --hard to the tag. Append results to .autodev-experiments.tsv (commit, tests_before, tests_after, keep/discard/crash, title, duration, cost, timestamp).

2. IMMUTABLE ORACLE: Create src/autodev/oracle.py with PROTECTED_PATTERNS list (pyproject.toml, ruff.toml, .ruff.toml, setup.cfg, mypy.ini, conftest.py, autodev.toml) and check_oracle_violation(changed_files) function that returns protected files that were modified. Integrate into ratchet: if oracle files touched, auto-rollback regardless of test results.

3. RATE LIMITING: In auto_update.py, add _check_rate_limit() that queries applied_proposals table for today's count, returns False if >= 5 (configurable via max_daily_modifications). In db.py, add count_proposals_applied_since(since_date) method. Wire rate check into the run() pipeline before processing proposals.

4. DIFF REVIEW GATE: In auto_update.py, add _review_modification(tag) that runs git diff tag..HEAD, sends the diff to an LLM with a review prompt asking for {approved: bool, concerns: list, summary: str}. Call this after swarm completes but before the keep/rollback decision in the ratchet flow. Use the planner model for the review.

5. TRACE ANALYZER: Create src/autodev/trace_review.py with TraceAnalyzer class. analyze_run(run_id) reads traces from DB, extracts error patterns, file hotspots, wasted agents, success rate. generate_report(analysis) produces structured markdown. llm_review_traces(run_id) sends trace summaries to LLM for deeper pattern recognition. Add RunAnalysis and HistoryAnalysis dataclasses.

6. TRACE REVIEW CLI: In cli.py, add autodev trace-review command with --last, --run-id, --history, --runs, and --deep flags. --last reviews most recent run, --deep enables LLM-assisted review.

7. AUTO-REVIEW HOOK: In controller.py cleanup, after _generate_completion_report(), run TraceAnalyzer.analyze_run() and write findings to .autodev-traces/{run_id}/REVIEW.md. Append key recommendations to learnings file.

8. CONTRIBUTOR PROTOCOL: Create src/autodev/contrib.py with ContributorProtocol class. claim_proposal(proposal_id) uses git-based optimistic locking via .autodev-claims.json. publish_result() appends to shared experiment log. sync_learnings() pulls and merges shared learnings. Add autodev contrib CLI subcommands: register, proposals, claim, publish, sync.

9. TESTS: Unit tests for ratchet (checkpoint/rollback/keep), oracle (violation detection), rate limiting, trace analyzer, contributor protocol (claim/publish/sync). All existing tests must continue to pass.

Use .venv/bin/python for all Python commands.
Run .venv/bin/python -m pytest tests/ -q to verify changes.
Run .venv/bin/ruff check src/ tests/ to verify linting.
"""

[target.verification]
command = ".venv/bin/python -m pytest -q && .venv/bin/ruff check src/ tests/"
timeout = 300
setup_command = "uv sync --extra dev"
setup_timeout = 120

[scheduler]
session_timeout = 3600
model = "opus"

[scheduler.parallel]
num_workers = 4
pool_dir = "/Users/dannyliu/personal_projects/.mc-pool-ads"
warm_clones = 4

[scheduler.budget]
max_per_session_usd = 8.0
max_per_run_usd = 100.0

[rounds]
max_rounds = 10
stall_threshold = 7
cooldown_between_rounds = 30

[planner]
max_depth = 1
max_children_per_node = 3
budget_per_call_usd = 5.0

[planner.deliberation]
max_rounds = 1
critic_model = "haiku"

[continuous]
max_wall_time_seconds = 86400
min_ambition_score = 2
max_replan_attempts = 3
verify_before_merge = false
enforce_acceptance_criteria = false
reconcile_interval = 5
layer_drain_timeout_base = 5400
layer_drain_timeout_per_unit = 600

[green_branch]
working_branch = "autodev/working"
green_branch = "autodev/green"
fixup_max_attempts = 5
auto_push = true
push_branch = "main"

[discovery]
enabled = false

[heartbeat]
interval = 300
idle_threshold = 5

[deliberation]
max_rounds = 1
critic_model = "haiku"

[swarm]
planner_model = "opus"
planner_cooldown = 30
max_agents = 0
min_agents = 2
stagnation_threshold = 5

[backend]
type = "local"
