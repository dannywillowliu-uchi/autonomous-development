[target]
name = "autonomous-development"
path = "/Users/dannyliu/personal_projects/autonomous-development"
branch = "main"
objective = """Implement capability awareness and auto-update pipeline for autonomous-development.

Read the full spec at docs/superpowers/specs/2026-03-12-capability-awareness-auto-update-design.md before starting.

Implementation priorities (in order):

1. CAPABILITY MANIFEST: Create src/autodev/swarm/capabilities.py with CapabilityManifest dataclass and scan_capabilities() function. Scans ~/.claude/skills/, .claude/skills/, ~/.claude/agents/, .claude/agents/, hooks from settings.json files, MCP servers from ~/.claude.json and .mcp.json. Call it in controller.initialize() and store as self._capabilities. Render as "## Available Capabilities" section in context.py render_for_planner(). Pass to build_worker_prompt() so workers know what skills they can invoke.

2. NEW DECISION TYPES: Add create_hook, register_mcp, create_agent_def, use_skill to DecisionType enum in swarm/models.py. Implement handler methods in controller.py: _handle_create_hook (writes to .claude/settings.json), _handle_register_mcp (writes to .mcp.json), _handle_create_agent_def (writes .claude/agents/<name>.md), _handle_use_skill (sends directive to agent inbox).

3. PLANNER PROMPT UPDATES: Update SYSTEM_PROMPT in prompts.py with new decision types, payload schemas, and capability awareness guidance. Include instruction: "Use existing capabilities before creating new ones."

4. INTEL CLAUDE CODE SCANNER: Create src/autodev/intelligence/claude_code.py with ClaudeCodeScanner class. Fetches GitHub releases for anthropics/claude-code, diffs against installed version (claude --version), parses for automation-relevant features, scores relevance. Register in scanner.py alongside existing scanners.

5. EVALUATOR EXTENSION: Add claude_code_release category to evaluator.py with risk classification (low: new skill/docs/tests, high: architecture/spawn/config changes) and target module mapping for autodev files.

6. AUTO-UPDATE PIPELINE: Create src/autodev/auto_update.py with AutoUpdatePipeline class. Bridges intel proposals to swarm missions. Low-risk auto-launches, high-risk sends to Telegram for approval. Tracks applied proposals in DB (new applied_proposals table in db.py). Add "autodev auto-update" CLI command in cli.py with --dry-run and --approve-all flags.

7. TELEGRAM FIX: Debug and fix src/autodev/notifier.py. Verify env vars (TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID) are read correctly. Test async httpx client against Bot API. Add request_approval() method for high-risk proposal approval gate.

8. SPAWN UPDATES: Ensure build_claude_cmd() in config.py does not block access to global skills/plugins. When inherit_global_mcps is true, workers should see all installed capabilities.

9. TESTS: Unit tests for capability scanner, new decision handlers, claude_code scanner, auto-update pipeline, and Telegram notification delivery. All existing tests must continue to pass.

Use .venv/bin/python for all Python commands.
Run .venv/bin/python -m pytest tests/ -q to verify changes.
Run .venv/bin/ruff check src/ tests/ to verify linting.
"""

[target.verification]
command = ".venv/bin/python -m pytest -q && .venv/bin/ruff check src/ tests/"
timeout = 300
setup_command = "uv sync --extra dev"
setup_timeout = 120

[scheduler]
session_timeout = 3600
model = "opus"

[scheduler.parallel]
num_workers = 4
pool_dir = "/Users/dannyliu/personal_projects/.mc-pool-ads"
warm_clones = 4

[scheduler.budget]
max_per_session_usd = 8.0
max_per_run_usd = 100.0

[rounds]
max_rounds = 10
stall_threshold = 7
cooldown_between_rounds = 30

[planner]
max_depth = 1
max_children_per_node = 3
budget_per_call_usd = 5.0

[planner.deliberation]
max_rounds = 1
critic_model = "haiku"

[continuous]
max_wall_time_seconds = 86400
min_ambition_score = 2
max_replan_attempts = 3
verify_before_merge = false
enforce_acceptance_criteria = false
reconcile_interval = 5
layer_drain_timeout_base = 5400
layer_drain_timeout_per_unit = 600

[green_branch]
working_branch = "autodev/working"
green_branch = "autodev/green"
fixup_max_attempts = 5
auto_push = true
push_branch = "main"

[discovery]
enabled = false

[heartbeat]
interval = 300
idle_threshold = 5

[deliberation]
max_rounds = 1
critic_model = "haiku"

[swarm]
planner_model = "opus"
planner_cooldown = 30
max_agents = 0
min_agents = 2
stagnation_threshold = 5

[backend]
type = "local"
