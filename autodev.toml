[target]
name = "autonomous-development"
path = "/Users/dannyliu/personal_projects/autonomous-development"
branch = "main"
objective = """Improve swarm observability and robustness for autonomous-development.

Read the full spec at docs/superpowers/specs/2026-03-12-swarm-observability-robustness-design.md before starting.

Implementation priorities (in order):

1. FIX COST TRACKING: In controller.py, add _parse_agent_cost(output: str) -> float that extracts cost from Claude Code agent output via regex (look for "Total cost: $X.XX" or similar patterns). Accumulate in self._total_cost_usd when agents complete. Store per-agent cost. Render cost breakdown (total, per-agent avg, budget remaining) in context.py render_for_planner().

2. PLANNER READS DIFFS: After agent completion in controller.py, run git diff --stat and git diff --name-only. Store files_changed in the agent's completion record. Add "## Recent Changes" section in context.py render_for_planner() showing files modified by recently completed agents. This lets the planner detect conflicts and validate agent claims.

3. COMMIT-PER-TASK: After successful task completion in controller.py, auto-commit changes with message "autodev: {task_title} (agent: {agent_name})". Store commit hash in task completion record. Skip if no files changed. Do NOT commit on agent failure.

4. WORKER SELF-VERIFICATION: In worker_prompt.py build_worker_prompt(), add instruction telling workers to run the project verification command before reporting completion. Include the verification command from config.target.verification.command.

5. COMPLETION REPORT: Add _generate_completion_report() to controller.py. When swarm stops, generate report with: tasks completed/failed, total cost + per-agent breakdown, files changed (git diff --stat vs starting commit), duration, cycle count, learnings recorded. Write to .autodev-swarm-report.md.

6. LEARNING QUALITY FILTER: In learnings.py, add _score_learning(text) that scores by specificity (file paths, function names = +1), actionability (bug/fix/race/gotcha = +1), genericness (under 50 chars or "all pass"/"completed" = -0.5). Only persist score >= 0.5. Add dedup via text hashing.

7. STALE-TASK DETECTION: In controller.py before spawning an agent, if the task mentions a specific file, check git diff for that file. If recently modified by another agent, add a note to the spawned agent's prompt: "Note: {file} was recently modified by {agent}. Check if the issue is already resolved."

8. TESTS: Unit tests for cost parsing, learning quality filter, completion report generation, commit-per-task. All existing tests must continue to pass.

Use .venv/bin/python for all Python commands.
Run .venv/bin/python -m pytest tests/ -q to verify changes.
Run .venv/bin/ruff check src/ tests/ to verify linting.
"""

[target.verification]
command = ".venv/bin/python -m pytest -q && .venv/bin/ruff check src/ tests/"
timeout = 300
setup_command = "uv sync --extra dev"
setup_timeout = 120

[scheduler]
session_timeout = 3600
model = "opus"

[scheduler.parallel]
num_workers = 4
pool_dir = "/Users/dannyliu/personal_projects/.mc-pool-ads"
warm_clones = 4

[scheduler.budget]
max_per_session_usd = 8.0
max_per_run_usd = 100.0

[rounds]
max_rounds = 10
stall_threshold = 7
cooldown_between_rounds = 30

[planner]
max_depth = 1
max_children_per_node = 3
budget_per_call_usd = 5.0

[planner.deliberation]
max_rounds = 1
critic_model = "haiku"

[continuous]
max_wall_time_seconds = 86400
min_ambition_score = 2
max_replan_attempts = 3
verify_before_merge = false
enforce_acceptance_criteria = false
reconcile_interval = 5
layer_drain_timeout_base = 5400
layer_drain_timeout_per_unit = 600

[green_branch]
working_branch = "autodev/working"
green_branch = "autodev/green"
fixup_max_attempts = 5
auto_push = true
push_branch = "main"

[discovery]
enabled = false

[heartbeat]
interval = 300
idle_threshold = 5

[deliberation]
max_rounds = 1
critic_model = "haiku"

[swarm]
planner_model = "opus"
planner_cooldown = 30
max_agents = 0
min_agents = 2
stagnation_threshold = 5

[backend]
type = "local"
