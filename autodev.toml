[target]
name = "autonomous-development"
path = "/Users/dannyliu/personal_projects/autonomous-development"
branch = "main"
objective = """Implement the self-recursion loop for autonomous-development.

Read the full spec at docs/superpowers/specs/2026-03-12-self-recursion-loop-design.md before starting.

Implementation priorities (in order):

1. WEB SOURCE SCANNERS: Create src/autodev/intelligence/web_sources.py with WebSourceScanner class. Add scanners for Anthropic blog, OpenAI blog, DeepMind blog, GitHub trending, and ArXiv cs.AI. Each scanner fetches the page via httpx, parses entries, scores relevance using AUTOMATION_KEYWORDS from claude_code.py. Return list[Finding] with source and trust_level fields. Add trust_level field to Finding in intelligence/models.py.

2. SOURCE REGISTRATION: In intelligence/sources.py, register WebSourceScanner alongside existing ClaudeCodeScanner. Update run_scan() to call web_scanner.scan() and extend all_findings. Respect source trust levels (high/medium/low).

3. SPEC GENERATOR: Create src/autodev/intelligence/spec_generator.py with SpecGenerator class. generate_spec(proposal) fetches source material, reads relevant project modules, sends to LLM with structured prompt asking for problem statement, file changes, testing requirements, risk assessment. Returns markdown spec.

4. SPEC INTEGRATION: In auto_update.py, replace _generate_objective() with _generate_spec() that uses SpecGenerator. Write generated specs to docs/superpowers/specs/auto-{date}-{slug}.md. Pass spec content as the swarm objective.

5. SCHEDULER: Create src/autodev/scheduler.py with AutoUpdateScheduler class. run_forever() loop: scan, evaluate, execute, sleep, repeat. Configurable interval (default 24h). Graceful shutdown via stop(). Exception handling per cycle.

6. SCHEDULER CLI: In cli.py, add --daemon and --interval flags to auto-update command. --daemon runs the scheduler loop, --interval sets hours between cycles (default 24).

7. METRICS TRACKER: Create src/autodev/metrics.py with SwarmMetrics dataclass and MetricsTracker class. record_run() appends to .autodev-metrics.tsv. get_trend(last_n) analyzes trends across recent runs. correlate_with_modifications() compares metrics before/after self-modifications using experiments.tsv.

8. METRICS RECORDING HOOK: In controller.py cleanup (after _generate_completion_report), instantiate MetricsTracker and call record_run() with metrics parsed from the completion report.

9. METRICS CLI: In cli.py, add autodev metrics command with --trend and --correlate flags.

10. TESTS: Unit tests for web scanners (mock httpx), spec generator (mock LLM), scheduler (mock pipeline), metrics tracker (TSV recording, trend calc, correlation). All existing tests must continue to pass.

Use .venv/bin/python for all Python commands.
Run .venv/bin/python -m pytest tests/ -q to verify changes.
Run .venv/bin/ruff check src/ tests/ to verify linting.
"""

[target.verification]
command = ".venv/bin/python -m pytest -q && .venv/bin/ruff check src/ tests/"
timeout = 300
setup_command = "uv sync --extra dev"
setup_timeout = 120

[scheduler]
session_timeout = 3600
model = "opus"

[scheduler.parallel]
num_workers = 4
pool_dir = "/Users/dannyliu/personal_projects/.mc-pool-ads"
warm_clones = 4

[scheduler.budget]
max_per_session_usd = 8.0
max_per_run_usd = 100.0

[rounds]
max_rounds = 10
stall_threshold = 7
cooldown_between_rounds = 30

[planner]
max_depth = 1
max_children_per_node = 3
budget_per_call_usd = 5.0

[planner.deliberation]
max_rounds = 1
critic_model = "haiku"

[continuous]
max_wall_time_seconds = 86400
min_ambition_score = 2
max_replan_attempts = 3
verify_before_merge = false
enforce_acceptance_criteria = false
reconcile_interval = 5
layer_drain_timeout_base = 5400
layer_drain_timeout_per_unit = 600

[green_branch]
working_branch = "autodev/working"
green_branch = "autodev/green"
fixup_max_attempts = 5
auto_push = true
push_branch = "main"

[discovery]
enabled = false

[heartbeat]
interval = 300
idle_threshold = 5

[deliberation]
max_rounds = 1
critic_model = "haiku"

[swarm]
planner_model = "opus"
planner_cooldown = 30
max_agents = 0
min_agents = 2
stagnation_threshold = 5

[backend]
type = "local"
